      --red:          #8b1e0b;

      --vellum:       #fcfbf7;
      --border:       #d3c5b3;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "EB Garamond","Noto Serif TC","PMingLiU",serif;
      background: var(--parchment);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      border-bottom: 2px double var(--border);
      background: rgba(244,235,216,.93);
      backdrop-filter: blur(4px);
      padding: .6rem 1.2rem;

      font-size: 1rem;
      color: var(--ink);
      letter-spacing: .05em;
    }
    nav .controls { display: flex; gap: .5rem; align-items: center; }
    .btn-run {
      font-family: "Cinzel", serif;
      font-size: .8rem;
      letter-spacing: .08em;
      border: 1px solid var(--red);
      color: var(--parchment);
      background: var(--red);
      padding: .35rem 1.1rem;

    .btn-clear {

      color: var(--muted);
      background: transparent;
      padding: .35rem .85rem;

    .btn-clear:hover { border-color: var(--ink); color: var(--ink); }

    .sidebar-title {

      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--muted);
      padding: .6rem .8rem .4rem;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Examples list */

      display: block;
      padding: .5rem .8rem;
      font-size: .85rem;
      font-family: "Noto Serif TC", serif;
      color: var(--ink);
      cursor: pointer;
      border-bottom: 1px dotted var(--border);
      transition: background .15s;
      text-align: left;
      background: none;
      border-left: none;
      border-top: none;
      border-right: none;

    /* CodeMirror full-height */

<script>
// ═══════════════════════════════════════════════════════════════════
//  KANBUNSE INTERPRETER  (JavaScript port of main.rkt + oo-module.rkt)
// ═══════════════════════════════════════════════════════════════════

class KanbunSEInterpreter {
  constructor() {
    this._buf = '';
    this._steps = 0;
    this._MAX_STEPS = 3000000;
  }

  // ── Environment ──────────────────────────────────────────────────
  _mkEnv(parent) { return { parent, b: new Map() }; }

  _lookup(env, name) {
    let e = env;
    while (e) {
      if (e.b.has(name)) return e.b.get(name);
      e = e.parent;
    }
    throw new Error(name + ' 者、未聞其名也。');
  }

  // ── Chinese Numeral Conversion ───────────────────────────────────
  _cnMap() {
    return {
      '零':0,'〇':0,'一':1,'二':2,'三':3,'四':4,'五':5,
      '六':6,'七':7,'八':8,'九':9,'十':10,'百':100,'千':1000,
      '萬':10000,'億':100000000,'兆':1e12,'京':1e16,
      '壹':1,'貳':2,'叁':3,'參':3,'肆':4,'伍':5,'陸':6,
      '柒':7,'捌':8,'玖':9,'拾':10,'佰':100,'仟':1000,
      '廿':20,'卅':30,'卌':40,'兩':2,
      '分':0.1,'厘':0.01,'毫':0.001,'絲':0.0001,'忽':0.00001,'微':0.000001,
    };
  }

  fromChinese(token) {
    const M = this._cnMap();
    let s = token, neg = false;
    if (s.startsWith('負')) { neg = true; s = s.slice(1); }
    // Find decimal separator
    let sepIdx = -1;
    for (let i = 0; i < s.length; i++) {
      if (s[i] === '點' || s[i] === '又') { sepIdx = i; break; }
    }
    const intStr = sepIdx >= 0 ? s.slice(0, sepIdx) : s;
    const decStr = sepIdx >= 0 ? s.slice(sepIdx + 1) : '';

    const parseInt_ = (part) => {
      let total = 0, section = 0, current = 0;
      for (const c of [...part]) {
        if (!(c in M)) return null;
        const v = M[c];
        if (v >= 10) {
          if (v >= 10000) { total = (total + section + current) * v; section = 0; current = 0; }
          else { section += (current === 0 ? 1 : current) * v; current = 0; }
        } else { current += v; }
      }
      return total + section + current;
    };

    const parseDec_ = (part) => {
      let r = 0;
      let i = 0;
      for (const c of [...part]) {
        if (!(c in M)) return null;
        r += M[c] * Math.pow(10, -(i + 1));
        i++;
      }
      return r;
    };

    try {
      if (!intStr && !decStr) return null;
      const iv = intStr ? parseInt_(intStr) : 0;
      if (iv === null) return null;
      const dv = decStr ? parseDec_(decStr) : 0;
      if (dv === null) return null;
      return neg ? -(iv + dv) : (iv + dv);
    } catch { return null; }
  }

  toChinese(n) {
    if (!isFinite(n)) return String(n);
    if (n < 0) return '負' + this.toChinese(-n);
    const D = ['零','一','二','三','四','五','六','七','八','九'];
    const U = ['','十','百','千'];
    const LU = ['','萬','億','兆','京'];

    const cvtInt = (x) => {
      if (x === 0) return '零';
      const parts = [];
      let ui = 0, rem = x;
      while (rem > 0) {
        const seg = rem % 10000;
        if (seg) {
          let s = '', t = seg;
          for (let i = 0; i < 4; i++) {
            const d = t % 10;
            if (d) s = D[d] + U[i] + s;
            else if (s && s[0] !== '零') s = '零' + s;
            t = Math.floor(t / 10);
          }
          s = s.replace(/零+$/, '').replace(/零零/g, '零');
          if (ui > 0 && ui < LU.length) s += LU[ui];
          parts.unshift(s);
        } else { parts.unshift('零'); }
        rem = Math.floor(rem / 10000); ui++;
      }
      return parts.join('').replace(/^零+|零+$/g, '') || '零';
    };

    const cvtDec = (d) => {
      let res = [], rem = d;
      for (let i = 0; i < 8; i++) {
        rem *= 10;
        const digit = Math.floor(rem + 1e-10);
        const clamp = Math.min(digit, 9);
        if (clamp === 0 && res.length === 0) { rem -= digit; continue; }
        res.push(D[clamp]);
        rem -= digit;
        if (rem < 1e-10) break;
      }
      while (res.length && res[res.length - 1] === '零') res.pop();
      return res.join('');
    };

    const ip = Math.floor(Math.abs(n));
    const dp = Math.abs(n) - ip;
    const si = (ip === 0 && dp > 0) ? '' : cvtInt(ip);
    const sd = dp > 1e-9 ? '點' + cvtDec(dp) : '';
    return (si + sd) || '零';
  }

  // ── Stringify ────────────────────────────────────────────────────
  stringify(v) {
    if (typeof v === 'number') return this.toChinese(v);
    if (typeof v === 'string') return v;
    if (v === true)  return '陽';
    if (v === false || v === null || v === undefined) return '陰';
    if (Array.isArray(v)) return '【' + v.map(x => this.stringify(x)).join('、') + '】';
    if (v && v._t === 'inst') return '【' + v._cls._name + '之實體】';
    if (v && v._t === 'cls')  return '【' + v._name + '之類】';
    if (typeof v === 'function') return '【函數】';
    return String(v);
  }

  // ── Tokenizer ────────────────────────────────────────────────────
  tokenize(code) {
    // Strip comments
    const stripped = code.split('\n').map(line => {
      const i = line.indexOf(';');
      return i >= 0 ? line.slice(0, i) : line;
    }).join('\n');
    const spaced = stripped.replace(/\(/g, ' ( ').replace(/\)/g, ' ) ');
    const toks = [];
    const re = /\(|\)|「[^」]*」|[^\s()]+/gu;
    let m;
    while ((m = re.exec(spaced)) !== null) {
      if (m[0]) toks.push(m[0]);
    }
    return toks;
  }

  // ── Parser ───────────────────────────────────────────────────────
  atom(tok) {
    // Arabic number
    const n = Number(tok);
    if (!isNaN(n) && tok !== '') return n;
    // String literal 「...」
    if (tok.startsWith('「') && tok.endsWith('」'))
      return { _t: 'str', v: tok.slice(1, -1) };
    // Chinese number
    const cn = this.fromChinese(tok);
    if (cn !== null) return cn;
    return tok; // identifier / keyword
  }

  parse(toks) {
    const res = [];
    let i = 0;
    while (i < toks.length) {
      const [e, ni] = this._parseOne(toks, i);
      res.push(e); i = ni;
    }
    return res;
  }

  _parseOne(toks, i) {
    if (i >= toks.length) throw new Error('其既終乎、未見始也。');
    const t = toks[i];
    if (t === '(') {
      const lst = []; i++;
      while (i < toks.length && toks[i] !== ')') {
        const [e, ni] = this._parseOne(toks, i);
        lst.push(e); i = ni;
      }
      if (i >= toks.length) throw new Error('括未合、終無所見。');
      return [lst, i + 1];
    }
    if (t === ')') throw new Error('右括盈、左闕如也。');
    return [this.atom(t), i + 1];
  }

  // ── OOP Helpers ──────────────────────────────────────────────────
  _collectAttrs(cls) {
    if (!cls) return [];
    return [...this._collectAttrs(cls._parent), ...cls._attrs];
  }

  _mkInstance(cls) {
    const attrs = new Map();
    this._collectAttrs(cls).forEach(a => attrs.set(a, false));
    return { _t: 'inst', _cls: cls, _attrs: attrs };
  }

  _getAttr(inst, name) {
    if (!inst._attrs.has(name)) throw new Error('屬性 ' + name + ' 不存在於此實體及其父類');
    return inst._attrs.get(name) ?? false;
  }

  _setAttr(inst, name, val) {
    if (!inst._attrs.has(name)) throw new Error('屬性 ' + name + ' 不存在於此實體及其父類');
    inst._attrs.set(name, val);
  }

  _getMethod(inst, name) {
    let cls = inst._cls;
    while (cls) {
      if (cls._methods.has(name)) return cls._methods.get(name);
      cls = cls._parent;
    }
    throw new Error('方法 ' + name + ' 不存在於此類及其父類');
  }

  // ── Function / Method Factories ──────────────────────────────────
  _mkFn(params, body, defEnv) {
    const arity = params.length;
    const terp = this;
    const fn = function(...args) {
      if (args.length !== arity) throw new Error('參數之數不合乎法度。需' + arity + '而得' + args.length);
      const nenv = terp._mkEnv(defEnv);
      params.forEach((p, i) => nenv.b.set(p, args[i]));
      return terp.eval(body, nenv);
    };
    fn._kseArity = arity;
    return fn;
  }

  _mkMethod(params, body, defEnv) {
    const arity = params.length;
    const terp = this;
    const fn = function(inst, ...args) {
      if (args.length !== arity) throw new Error('方法參數不合。需' + arity + '而得' + args.length);
      const nenv = terp._mkEnv(defEnv);
      nenv.b.set('此', inst);
      params.forEach((p, i) => nenv.b.set(p, args[i]));
      return terp.eval(body, nenv);
    };
    fn._kseArity = arity;
    return fn;
  }

  // ── Equality ─────────────────────────────────────────────────────
  _eq(a, b) {
    if (a === b) return true;
    if (Array.isArray(a) && Array.isArray(b)) {
      if (a.length !== b.length) return false;
      return a.every((v, i) => this._eq(v, b[i]));
    }
    return false;
  }

  // ── Evaluator ────────────────────────────────────────────────────
  eval(expr, env) {
    this._steps++;
    if (this._steps > this._MAX_STEPS) throw new Error('運算逾限，或陷無窮也。');

    // Primitives
    if (typeof expr === 'number') return expr;
    if (expr && expr._t === 'str') return expr.v;   // string literal
    if (expr === null || expr === false) return false;

    if (typeof expr === 'string') {
      const KW = new Set(['書','加','減','乘','除','若','則','否','大衍','為','施',
        '於','夫','立','承','具','能','造','之','令','者','也','名','以',
        '等於','大於','小於','且','或','非','充','卦','而','為列以','未善',
        '遍','自','至','若非','所餘','整除','之實體','此']);
      if (KW.has(expr)) throw new Error('「' + expr + '」為語法關鍵字，不可單獨使用。');
      return this._lookup(env, expr);
    }

    if (!Array.isArray(expr)) return expr;

    const e = expr, len = e.length;
    if (len === 0) return false;

    const [a0, a1, a2, a3, a4, a5, a6, a7] = e;

    // ── Variable Definition ──────────────────────────────────
    // (varname 者 value 也)
    if (len === 4 && a1 === '者' && a3 === '也') {
      const v = this.eval(a2, env);
      env.b.set(a0, v);
      return v;
    }
    // (名 value 以 varname)
    if (len === 4 && a0 === '名' && a2 === '以') {
      const v = this.eval(a1, env);
      env.b.set(a3, v);
      return v;
    }

    // ── Class Definition ─────────────────────────────────────
    // (立 Name 具 (attrs) 能 (methods))
    if (len === 6 && a0 === '立' && a2 === '具' && a4 === '能') {
      const methods = new Map();
      if (Array.isArray(a5)) {
        for (const md of a5) {
          const [mn, mp, mb] = md;
          methods.set(mn, this._mkMethod(Array.isArray(mp) ? mp : [], mb, env));
        }
      }
      const cls = { _t:'cls', _name:a1, _attrs: Array.isArray(a3)?a3:[], _methods:methods, _parent:null };
      env.b.set(a1, cls);
      return cls;
    }
    // (立 Child 承 Parent 具 (attrs) 能 (methods))
    if (len === 8 && a0 === '立' && a2 === '承' && a4 === '具' && a6 === '能') {
      const parent = a3 === '無' ? null : this._lookup(env, a3);
      const methods = new Map();
      if (Array.isArray(a7)) {
        for (const md of a7) {
          const [mn, mp, mb] = md;
          methods.set(mn, this._mkMethod(Array.isArray(mp) ? mp : [], mb, env));
        }
      }
      const cls = { _t:'cls', _name:a1, _attrs: Array.isArray(a5)?a5:[], _methods:methods, _parent:parent };
      env.b.set(a1, cls);
      return cls;
    }

    // ── Instance Creation ────────────────────────────────────
    // (造 ClassName 之實體)
    if (len === 3 && a0 === '造' && a2 === '之實體') {
      const cls = this._lookup(env, a1);
      if (!cls || cls._t !== 'cls') throw new Error(a1 + ' 非類也');

      const inst = this.eval(a1, env);
      const val  = this.eval(a5, env);

      const mfn  = this._getMethod(inst, a1[2]);
      const args = Array.isArray(a3) ? a3.map(x => this.eval(x, env)) : [this.eval(a3, env)];

    }

    // ── Function Call ────────────────────────────────────────
    // (施 func 於 args)

      const fn = this.eval(a1, env);

      else argsVal = this.eval(a3, env);
      const arity = fn._kseArity !== undefined ? fn._kseArity : fn.length;
      if (arity === 1) return fn(argsVal);
      if (Array.isArray(argsVal)) return fn(...argsVal);
      return fn(argsVal);
    }

    // ── List Element Access ──────────────────────────────────
    // (container 之 idx 者)
    if (len === 4 && a1 === '之' && a3 === '者') {
      const cont = this.eval(a0, env);
      const idx  = Math.floor(this.eval(a2, env));
      if (!Array.isArray(cont)) throw new Error(String(a0) + ' 者非列也！');
      if (idx < 1 || idx > cont.length) throw new Error('索驥圖外、其轍亂矣。');
      return cont[idx - 1];
    }

    // ── Attribute / Length Access ────────────────────────────
    // (obj 之 attr)
    if (len === 3 && a1 === '之') {
      const obj = this.eval(a0, env);
      if (obj && obj._t === 'inst') return this._getAttr(obj, a2);
      if (Array.isArray(obj)) {
        if (a2 === '長') return obj.length;
        const idx = typeof a2 === 'number' ? a2 : Math.floor(this.eval(a2, env));
        if (idx < 1 || idx > obj.length) throw new Error('索驥圖外、其轍亂矣。');
        return obj[idx - 1];

    }

    // ── Arithmetic ───────────────────────────────────────────
    if (len === 4 && a0 === '加' && a2 === '以') return this.eval(a1,env) + this.eval(a3,env);
    if (len === 4 && a0 === '減' && a2 === '以') return this.eval(a1,env) - this.eval(a3,env);
    if (len === 4 && a0 === '乘' && a2 === '以') return this.eval(a1,env) * this.eval(a3,env);
    if (len === 4 && a0 === '除' && a2 === '以') return this.eval(a1,env) / this.eval(a3,env);

    if (len === 3 && a1 === '大於') return this.eval(a0,env) > this.eval(a2,env);
    if (len === 3 && a1 === '小於') return this.eval(a0,env) < this.eval(a2,env);

    if (len === 3 && a1 === '且') return this.eval(a0,env) && this.eval(a2,env);
    if (len === 3 && a1 === '或') return this.eval(a0,env) || this.eval(a2,env);

    if (len === 2 && a0 === '書') {

      this._buf += this.stringify(v) + '\n';

      const s = Math.floor(this.eval(a3, env));
      const f = Math.floor(this.eval(a5, env));

CodeMirror.defineMode('kanbunse', () => {
  const KW = new Set([
    '者','也','名','以','加','減','乘','除','所餘','整除',
    '等於','大於','小於','且','或','非','若','則','若非',
    '書','未善','為','遍','大衍','自','至','夫','施','於',
    '立','承','具','能','造','之實體','之','令','充','卦','而','為列以','此',
  ]);
  const BOOL = new Set(['陽','陰']);
  const CN = /^[負零〇一二三四五六七八九十百千萬億兆京垓壹貳叁參肆伍陸柒捌玖拾佰仟廿卅卌兩分厘毫絲忽微點又]+$/u;

  return {
    token(stream) {
      if (stream.eatSpace()) return null;
      // comment
      if (stream.peek() === ';') { stream.skipToEnd(); return 'comment'; }
      // string 「...」
      if (stream.peek() === '「') {
        stream.next();
        while (!stream.eol() && stream.peek() !== '」') stream.next();
        if (!stream.eol()) stream.next();
        return 'string';
      }
      // parens
      if (stream.peek() === '(' || stream.peek() === ')') { stream.next(); return 'bracket'; }
      // word
      let w = '';
      while (!stream.eol() && !/[\s()「]/.test(stream.peek())) w += stream.next();
      if (!w) { stream.next(); return null; }
      if (BOOL.has(w)) return 'atom';
      if (KW.has(w))   return 'keyword';
      if (/^-?\d+(\.\d+)?$/.test(w)) return 'number';
      if (CN.test(w))  return 'number';
      return 'variable';
    }
  };
});

CodeMirror.defineMIME('text/x-kanbunse', 'kanbunse');

// ═══════════════════════════════════════════════════════════════════
//  UI SETUP
// ═══════════════════════════════════════════════════════════════════

const terp = new KanbunSEInterpreter();

// ── CodeMirror ───────────────────────────────────────────────────
const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'kanbunse',
  theme: 'kanbun',
  lineNumbers: true,
  matchBrackets: true,
  autoCloseBrackets: { pairs: '()', explode: '()' },
  styleActiveLine: true,
  indentUnit: 4,
  tabSize: 4,
  lineWrapping: false,
  extraKeys: {
    'Ctrl-Enter': runCode,
    'Cmd-Enter':  runCode,
  },
});

// ── Output helpers ───────────────────────────────────────────────
const outEl = document.getElementById('output');

function appendOut(text, cls) {
  text.split('\n').forEach(line => {
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = line + '\n';
    outEl.appendChild(span);
  });
  outEl.scrollTop = outEl.scrollHeight;
}

function clearOutput() { outEl.innerHTML = ''; }

// ── Run ──────────────────────────────────────────────────────────
function runCode() {
  clearOutput();
  const code = editor.getValue();
  if (!code.trim()) {
    appendOut('（無代碼可執行）', 'info-line');
    return;
  }
  const t0 = performance.now();
  const res = terp.run(code);
  const dt = (performance.now() - t0).toFixed(1);

  if (res.output) appendOut(res.output, 'out-line');
  if (res.error)  appendOut('錯誤：' + res.error, 'err-line');
  appendOut('\n─ 耗時 ' + dt + 'ms', 'info-line');
}

document.getElementById('btn-run').addEventListener('click', runCode);
document.getElementById('btn-clear').addEventListener('click', clearOutput);

// ── Examples sidebar ─────────────────────────────────────────────
const exList = document.getElementById('example-list');
let activeBtn = null;

Object.entries(EXAMPLES).forEach(([name, code]) => {
  const btn = document.createElement('button');
  btn.className = 'example-item';
  btn.textContent = name;
  btn.addEventListener('click', () => {
    editor.setValue(code.trimStart());
    editor.clearHistory();
    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    clearOutput();
  });
  exList.appendChild(btn);
});

// ── Keyword Reference sidebar ────────────────────────────────────
const refPanel = document.getElementById('ref-panel');
KWREF.forEach(section => {
  const sec = document.createElement('div');
  sec.className = 'ref-section';
  const title = document.createElement('div');
  title.className = 'ref-section-title';
  title.textContent = section.cat;
  sec.appendChild(title);

  section.items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'ref-item';
    const kw = document.createElement('span');
    kw.className = 'ref-kw';
    kw.textContent = item.kw;
    kw.title = '點擊插入範本';
    kw.addEventListener('click', () => {
      const cm = editor;
      const cursor = cm.getCursor();
      cm.replaceRange(item.tmpl, cursor);
      cm.focus();
    });
    const desc = document.createElement('span');
    desc.className = 'ref-desc';
    desc.textContent = item.desc;
    row.appendChild(kw);
    row.appendChild(desc);
    sec.appendChild(row);
  });
  refPanel.appendChild(sec);
});

// ── Hover Tooltip ────────────────────────────────────────────────
const tooltip = document.getElementById('kw-tooltip');
const KWMAP = {};
KWREF.forEach(s => s.items.forEach(it => { KWMAP[it.kw] = it; }));

const ALL_KW = {};
KWREF.forEach(sec => sec.items.forEach(it => { ALL_KW[it.kw] = it; }));

// Map each bare keyword to its reference entry
const BARE_KW = {};
KWREF.forEach(sec => sec.items.forEach(it => {
  it.kw.split(/[…。、（）\s]+/).filter(Boolean).forEach(k => {
    if (!BARE_KW[k]) BARE_KW[k] = it;
  });
}));

editor.getWrapperElement().addEventListener('mousemove', e => {
  try {
    const pos = editor.coordsChar({ left: e.clientX, top: e.clientY });
    const tok = editor.getTokenAt(pos);
    if ((tok.type === 'keyword' || tok.type === 'atom') && BARE_KW[tok.string]) {
      const info = BARE_KW[tok.string];
      tooltip.innerHTML = `<strong>${info.kw}</strong> — ${info.desc}<code>${info.tmpl}</code>`;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 8) + 'px';
      return;
    }
  } catch {}
  tooltip.style.display = 'none';
});
editor.getWrapperElement().addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ── Load first example by default ───────────────────────────────
exList.firstChild && exList.firstChild.click();
</script>
